name: HF Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/hf-package.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/build-hf-package.sh'
      - 'deploy/docker-entrypoint.sh'
      - 'deploy/redis/redis-hf.conf'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'

      - name: Build HF package
        env:
          PKG_NAME: gatewayTestSub-hf-linux-amd64.tar.gz
          TARGET_OS: linux
          TARGET_ARCH: amd64
        run: bash deploy/build-hf-package.sh

      - name: Publish fixed HF package release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: hf-latest
          ASSET: release/hf/gatewayTestSub-hf-linux-amd64.tar.gz
        run: |
          set -euo pipefail
          git tag -f "${TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${TAG}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "HF latest package" \
              --notes "Prebuilt Hugging Face runtime package for ${GITHUB_SHA}."
          else
            gh release create "${TAG}" \
              --title "HF latest package" \
              --notes "Prebuilt Hugging Face runtime package for ${GITHUB_SHA}."
          fi

          gh release upload "${TAG}" "${ASSET}" --clobber
